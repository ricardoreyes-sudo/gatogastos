</head>

    // ---------- Componentes compartidos ----------

    const CatEars = () => (

    function SaveIndicator({ status }) {

      const { Icon } = config;
      return (
        <div className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg ${config.bg} border ${config.border} ${config.pulse ? 'saved-pulse' : ''}`}>

    // ---------- Login Screen ----------

    function LoginScreen({ onEntrar, codigoSugerido }) {
      const [input, setInput] = useState(codigoSugerido || '');
      const [error, setError] = useState('');
      const [cargando, setCargando] = useState(false);

      const handleSubmit = async () => {
        const code = input.trim().toLowerCase();
        setError('');
        if (!/^[a-z0-9_-]{3,50}$/.test(code)) {
          setError('Usa entre 3 y 50 caracteres: letras (sin acentos), números, guiones o guiones bajos.');
          return;
        }
        setCargando(true);
        try {
          const { data: row, error: selectError } = await supabase
            .from('hogares').select('codigo').eq('codigo', code).maybeSingle();
          if (selectError) throw selectError;
          if (!row) {
            const { error: insertError } = await supabase
              .from('hogares').insert({ codigo: code, datos: DEFAULTS });
            if (insertError && insertError.code !== '23505') throw insertError;
          }
          onEntrar(code);
        } catch (err) {
          console.error(err);
          setError('No pudimos conectar con la nube. Revisa tu conexión y vuelve a intentar.');
        } finally {
          setCargando(false);
        }
      };

      return (

              </div>
            </div>

            <div className="relative bg-zinc-900 rounded-2xl border border-zinc-800 p-6 shadow-xl">
              <CatEars />
              <div className="flex items-center gap-2 mb-4">
                <KeyRound className="w-4 h-4 text-purple-400" />
                <h2 className="text-base font-semibold">Código de hogar</h2>
              </div>
              <p className="text-sm text-zinc-400 mb-5 leading-relaxed">
                Tú y tu pareja usan el mismo código para ver los mismos datos desde cualquier dispositivo. Se sincroniza en vivo. 🐾
              </p>

              <div className="space-y-3">
                <div className="bg-zinc-950 rounded-xl border border-zinc-800 focus-within:border-zinc-700 px-3 py-3 transition-colors">
                  <input
                    type="text"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter' && !cargando) handleSubmit(); }}
                    placeholder="ej: luna-salem-07"
                    className="w-full bg-transparent text-zinc-100 placeholder-zinc-600 outline-none text-base font-mono"
                    autoFocus
                    disabled={cargando}
                    spellCheck="false"
                    autoCapitalize="none"
                  />
                </div>

                {error && (
                  <div className="flex items-start gap-2 p-3 rounded-lg bg-rose-500/10 border border-rose-500/30">
                    <AlertCircle className="w-4 h-4 text-rose-400 flex-shrink-0 mt-0.5" />
                    <p className="text-xs text-rose-300 leading-relaxed">{error}</p>
                  </div>
                )}

                <button
                  onClick={handleSubmit}
                  disabled={cargando || !input.trim()}
                  className="w-full py-3 rounded-xl bg-purple-600 hover:bg-purple-500 text-zinc-100 text-sm font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                  {cargando ? (
                    <><Loader2 className="w-4 h-4 animate-spin" /><span>Conectando...</span></>
                  ) : (
                    <span>Entrar al hogar</span>
                  )}
                </button>
              </div>
            </div>

            <p className="text-xs text-zinc-500 text-center leading-relaxed px-2">
              ¿Primera vez? Inventa un código único y compártelo con tu pareja. Al entrar al mismo código, comparten los mismos datos.
            </p>

    }

    // ---------- Tarjetas ----------

    function PersonCard({ person, share, net, accent, addExpense, updateExpense, removeExpense, updatePerson, fmt }) {
      const colors = accent === 'purple'
        ? { text: 'text-purple-400', bgSoft: 'bg-purple-500/20' }
        : { text: 'text-amber-400', bgSoft: 'bg-amber-400/20' };
      const expTotal = person.expenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);

      return (
        <div className="relative bg-zinc-900 rounded-2xl border border-zinc-800 p-5 shadow-xl">
          <CatEars />
          <div className="flex items-center gap-3 mb-4">
            <div className={`w-10 h-10 rounded-xl ${colors.bgSoft} flex items-center justify-center`}>
              <Cat className={`w-5 h-5 ${colors.text}`} strokeWidth={2} />
            </div>
            <input
              type="text"
              value={person.name}
              onChange={e => updatePerson('name', e.target.value)}
              className="flex-1 bg-transparent text-lg font-semibold text-zinc-100 outline-none border-b border-transparent focus:border-zinc-700 pb-0.5 min-w-0"
            />
          </div>

          <div className="mb-4">
            <label className="block text-xs text-zinc-500 mb-1.5">Ingreso mensual</label>
            <div className="flex items-center bg-zinc-950 rounded-xl px-3 py-2.5 border border-zinc-800 focus-within:border-zinc-700">
              <span className="text-zinc-600 text-sm mr-1">$</span>
              <input
                type="number"
                value={person.income || ''}
                onChange={e => updatePerson('income', Number(e.target.value))}
                placeholder="0"
                className="flex-1 bg-transparent text-zinc-100 outline-none min-w-0"

            </div>
          </div>

          <div className="mb-3">
            <div className="flex items-center justify-between mb-2">
              <label className="text-xs text-zinc-500">Gastos individuales</label>
              <span className="text-xs text-zinc-500">{fmt(expTotal)}</span>
            </div>
            <div className="space-y-1.5">
              {person.expenses.map(exp => (
                <div key={exp.id} className="flex items-center gap-2 bg-zinc-950 rounded-lg p-2 border border-zinc-800">
                  <input
                    type="text"

                    onChange={e => updateExpense(exp.id, 'name', e.target.value)}

                  <span className="text-zinc-600 text-xs">$</span>
                  <input
                    type="number"
                    value={exp.amount || ''}
                    onChange={e => updateExpense(exp.id, 'amount', Number(e.target.value))}
                    placeholder="0"
                    className="w-16 sm:w-20 bg-transparent text-sm text-zinc-100 placeholder-zinc-600 outline-none text-right"

                  <button
                    onClick={() => removeExpense(exp.id)}

              ))}
            </div>

          <button

            className="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg border border-dashed border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-zinc-300 text-xs transition-colors mb-4"
          >

            Agregar gasto

          <div className="pt-4 border-t border-zinc-800 space-y-2">

                {fmt(net)}

      );
    }

    function GoalCard({ goal, onUpdate, onRemove, fmt }) {
      const pct = goal.target > 0 ? Math.min(100, (goal.current / goal.target) * 100) : 0;
      const remaining = Math.max(0, goal.target - goal.current);
      const completed = goal.current >= goal.target && goal.target > 0;

      return (
        <div className="relative bg-zinc-900 rounded-2xl border border-zinc-800 p-5 shadow-xl">
          <div className="flex items-start justify-between gap-2 mb-4">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <div className="w-8 h-8 rounded-lg bg-zinc-950 border border-zinc-800 flex items-center justify-center flex-shrink-0">
                <Target className="w-4 h-4 text-purple-400" />
              </div>
              <input
                type="text"
                value={goal.name}
                onChange={e => onUpdate('name', e.target.value)}
                className="flex-1 bg-transparent text-sm font-semibold text-zinc-100 outline-none min-w-0"

            </div>
            <button
              onClick={onRemove}
              className="p-1 rounded-md text-zinc-600 hover:text-rose-400 transition-colors flex-shrink-0"
              aria-label="Eliminar meta"
            >
              <X className="w-4 h-4" />
            </button>
          </div>

          <div className="mb-4">
            <div className="flex items-baseline justify-between mb-1.5">
              <span className={`text-xl font-bold ${completed ? 'text-emerald-400' : 'text-zinc-100'}`}>
                {fmt(goal.current)}
              </span>
              <span className="text-xs text-zinc-500">de {fmt(goal.target)}</span>
            </div>
            <div className="h-2 bg-zinc-950 rounded-full overflow-hidden border border-zinc-800">
              <div
                className={`h-full rounded-full transition-all duration-500 ${completed ? 'bg-emerald-400' : 'bg-purple-500'}`}
                style={{ width: `${pct}%` }}
              />
            </div>
            <div className="flex justify-between mt-1.5">
              <span className="text-xs text-zinc-500">{pct.toFixed(0)}%</span>
              <span className="text-xs text-zinc-400 flex items-center gap-1">
                {completed
                  ? <><Sparkles className="w-3 h-3 text-emerald-400" /> ¡Completada!</>
                  : <>faltan {fmt(remaining)}</>
                }
              </span>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="block text-xs text-zinc-500 mb-1">Ahorrado</label>
              <div className="flex items-center bg-zinc-950 rounded-lg px-2 py-1.5 border border-zinc-800">
                <span className="text-zinc-600 text-xs mr-1">$</span>
                <input
                  type="number"
                  value={goal.current || ''}
                  onChange={e => onUpdate('current', Number(e.target.value))}
                  placeholder="0"
                  className="flex-1 bg-transparent text-xs text-zinc-100 placeholder-zinc-600 outline-none min-w-0"

            <div>

              <div className="flex items-center bg-zinc-950 rounded-lg px-2 py-1.5 border border-zinc-800">
                <span className="text-zinc-600 text-xs mr-1">$</span>
                <input
                  type="number"
                  value={goal.target || ''}
                  onChange={e => onUpdate('target', Number(e.target.value))}
                  placeholder="0"

                />

    // ---------- Hogar (la app autenticada) ----------

    function Hogar({ codigo, onSalir }) {
      const [data, setData] = useState(null);
      const [saveStatus, setSaveStatus] = useState('idle');
      const [loadError, setLoadError] = useState('');
      const [codigoCopiado, setCodigoCopiado] = useState(false);

      const lastSavedJson = useRef(null);
      const saveTimeout = useRef(null);
      const applyingRemote = useRef(false);

      // Cargar datos al montar
      useEffect(() => {
        let cancelado = false;
        (async () => {
          try {
            const { data: row, error } = await supabase
              .from('hogares').select('*').eq('codigo', codigo).maybeSingle();
            if (error) throw error;
            if (cancelado) return;
            const datos = row ? { ...DEFAULTS, ...row.datos } : DEFAULTS;
            setData(datos);
            lastSavedJson.current = JSON.stringify(datos);
          } catch (err) {
            console.error('Error al cargar', err);
            if (!cancelado) setLoadError('No pudimos cargar los datos de tu hogar. Revisa tu conexión y vuelve a intentar.');
          }
        })();
        return () => { cancelado = true; };
      }, [codigo]);

      // Realtime: escuchar cambios del otro dispositivo
      useEffect(() => {
        const channel = supabase
          .channel(`hogar-${codigo}`)
          .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'hogares',
            filter: `codigo=eq.${codigo}`,
          }, (payload) => {
            const newData = payload.new?.datos;
            if (!newData) return;
            const newJson = JSON.stringify(newData);
            if (newJson !== lastSavedJson.current) {
              applyingRemote.current = true;
              lastSavedJson.current = newJson;
              setData(newData);
              setTimeout(() => { applyingRemote.current = false; }, 50);
            }
          })
          .subscribe();
        return () => { supabase.removeChannel(channel); };
      }, [codigo]);

      // Auto-save con debounce
      useEffect(() => {
        if (!data) return;
        if (applyingRemote.current) return;
        const currentJson = JSON.stringify(data);
        if (currentJson === lastSavedJson.current) return;

        setSaveStatus('saving');
        if (saveTimeout.current) clearTimeout(saveTimeout.current);
        saveTimeout.current = setTimeout(async () => {
          try {
            const { error } = await supabase
              .from('hogares')
              .update({ datos: data, actualizado_en: new Date().toISOString() })
              .eq('codigo', codigo);
            if (error) throw error;
            lastSavedJson.current = currentJson;
            setSaveStatus('saved');
          } catch (err) {
            console.error('Error al guardar', err);
            setSaveStatus('error');
          }
        }, 700);

        return () => { if (saveTimeout.current) clearTimeout(saveTimeout.current); };
      }, [data, codigo]);

      // Volver a idle después de mostrar "Guardado"
      useEffect(() => {
        if (saveStatus === 'saved') {
          const t = setTimeout(() => setSaveStatus('idle'), 2000);
          return () => clearTimeout(t);
        }
      }, [saveStatus]);

      // Helpers
      const sum = (arr) => arr.reduce((s, e) => s + (Number(e.amount) || 0), 0);
      const fmt = (n) => '$' + Math.round(n).toLocaleString('es-MX');
      const nextId = (arr) => arr.length === 0 ? 1 : Math.max(...arr.map(x => x.id)) + 1;

      // Mutadores
      const updatePerson = (key, field, value) =>
        setData(d => ({ ...d, [key]: { ...d[key], [field]: value } }));

      const addExpense = (key) =>
        setData(d => ({
          ...d,
          [key]: { ...d[key], expenses: [...d[key].expenses, { id: nextId(d[key].expenses), name: '', amount: 0 }] }
        }));

      const updateExpense = (key, id, field, value) =>
        setData(d => ({
          ...d,
          [key]: { ...d[key], expenses: d[key].expenses.map(e => e.id === id ? { ...e, [field]: value } : e) }
        }));

      const removeExpense = (key, id) =>
        setData(d => ({ ...d, [key]: { ...d[key], expenses: d[key].expenses.filter(e => e.id !== id) } }));

      const addShared = () =>
        setData(d => ({ ...d, shared: [...d.shared, { id: nextId(d.shared), name: '', amount: 0 }] }));

      const updateShared = (id, field, value) =>
        setData(d => ({ ...d, shared: d.shared.map(e => e.id === id ? { ...e, [field]: value } : e) }));

      const removeShared = (id) =>
        setData(d => ({ ...d, shared: d.shared.filter(e => e.id !== id) }));

      const setSplitMode = (mode) => setData(d => ({ ...d, splitMode: mode }));

      const addGoal = () =>
        setData(d => ({ ...d, goals: [...d.goals, { id: nextId(d.goals), name: 'Nueva meta', target: 10000, current: 0 }] }));

      const updateGoal = (id, field, value) =>
        setData(d => ({ ...d, goals: d.goals.map(g => g.id === id ? { ...g, [field]: value } : g) }));

      const removeGoal = (id) =>
        setData(d => ({ ...d, goals: d.goals.filter(g => g.id !== id) }));

      const resetData = () => {
        const ok = window.confirm('¿Seguro que quieres reiniciar los datos de este hogar? Tu pareja también verá el cambio. No se puede deshacer.');
        if (!ok) return;
        setData(DEFAULTS);
      };

      const exportJSON = () => {
        try {
          const payload = { ...data, codigo, exportedAt: new Date().toISOString() };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `gatogasto-${codigo}-${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (err) {
          console.warn('No se pudo exportar', err);
        }
      };

      const copiarCodigo = async () => {
        try {
          await navigator.clipboard.writeText(codigo);
          setCodigoCopiado(true);
          setTimeout(() => setCodigoCopiado(false), 1500);
        } catch {
          console.warn('No se pudo copiar al portapapeles');
        }
      };

      if (loadError) {
        return (
          <div className="min-h-screen bg-zinc-950 text-zinc-100 flex flex-col items-center justify-center gap-4 px-4">
            <div className="w-16 h-16 rounded-2xl bg-rose-500/20 flex items-center justify-center">
              <AlertCircle className="w-8 h-8 text-rose-400" />
            </div>
            <p className="text-center text-zinc-400 max-w-sm">{loadError}</p>
            <button
              onClick={onSalir}
              className="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-sm text-zinc-300 hover:bg-zinc-800 transition-colors"
            >
              Volver al inicio
            </button>
          </div>
        );
      }

      if (!data) return <PantallaCarga mensaje="Cargando tu hogar..." />;

      // Cálculos
      const { personA, personB, shared, splitMode, goals } = data;
      const expA = sum(personA.expenses);
      const expB = sum(personB.expenses);
      const sharedTotal = sum(shared);
      const incomeA = Number(personA.income) || 0;
      const incomeB = Number(personB.income) || 0;
      const totalIncome = incomeA + incomeB;
      const totalExpenses = expA + expB + sharedTotal;
      const balance = totalIncome - totalExpenses;

      const shareA = splitMode === 'equal'
        ? sharedTotal / 2
        : totalIncome > 0 ? (incomeA / totalIncome) * sharedTotal : sharedTotal / 2;
      const shareB = sharedTotal - shareA;
      const netA = incomeA - expA - shareA;
      const netB = incomeB - expB - shareB;

      const getMessage = () => {
        if (totalIncome === 0) return { text: 'Empiecen agregando sus ingresos, miau', icon: Cat };
        const ratio = balance / totalIncome;
        if (ratio > 0.3) return { text: '¡Miau! Este mes van por excelente camino', icon: Sparkles };
        if (ratio > 0.1) return { text: 'Purr-fecto, mantienen un buen equilibrio', icon: Heart };
        if (ratio >= 0) return { text: 'Ajustados, pero siguen en verde', icon: Cat };
        return { text: 'Cuidado, este gato ve números rojos', icon: TrendingDown };
      };

      const msg = getMessage();
      const MsgIcon = msg.icon;

      const chartData = totalIncome > 0
        ? [{ name: personA.name, value: incomeA }, { name: personB.name, value: incomeB }]
        : [{ name: 'Sin datos', value: 1 }];

      return (
        <div className="min-h-screen bg-zinc-950 text-zinc-100">
          <div className="max-w-6xl mx-auto px-4 py-6 sm:px-6 sm:py-8 space-y-6">

            <header className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <div className="flex items-center gap-3 sm:gap-4">
                <div className="relative">
                  <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-purple-600 flex items-center justify-center shadow-lg shadow-purple-900/50">
                    <Cat className="w-7 h-7 sm:w-8 sm:h-8 text-zinc-950" strokeWidth={2.2} />
                  </div>
                  <div className="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-amber-400 ring-2 ring-zinc-950"></div>
                </div>
                <div className="min-w-0">
                  <h1 className="text-xl sm:text-2xl font-bold tracking-tight">GatoGasto</h1>
                  <button
                    onClick={copiarCodigo}
                    className="text-xs sm:text-sm text-zinc-500 hover:text-zinc-300 flex items-center gap-1.5 transition-colors group"
                    title="Copiar código de hogar"
                  >
                    <KeyRound className="w-3 h-3" />
                    <span className="font-mono truncate max-w-[180px]">{codigo}</span>
                    {codigoCopiado
                      ? <Check className="w-3 h-3 text-emerald-400 flex-shrink-0" />
                      : <Copy className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0" />
                    }
                  </button>
                </div>
              </div>

              <div className="flex items-center gap-2 flex-wrap">
                <SaveIndicator status={saveStatus} />
                <button
                  onClick={exportJSON}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs text-zinc-300 transition-colors"
                  title="Descargar respaldo"
                >
                  <Download className="w-3.5 h-3.5" />
                  <span className="hidden sm:inline">Exportar</span>
                </button>
                <button
                  onClick={resetData}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs text-zinc-400 hover:text-rose-400 transition-colors"
                  title="Reiniciar datos del hogar"
                >
                  <RotateCcw className="w-3.5 h-3.5" />
                  <span className="hidden sm:inline">Reiniciar</span>
                </button>
                <button
                  onClick={onSalir}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs text-zinc-400 hover:text-zinc-200 transition-colors"
                  title="Salir de este hogar"
                >
                  <LogOut className="w-3.5 h-3.5" />
                  <span className="hidden sm:inline">Salir</span>
                </button>
              </div>
            </header>

            <section className="relative bg-zinc-900 rounded-2xl border border-zinc-800 p-5 sm:p-6 shadow-xl">
              <CatEars />
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div className="md:col-span-2 space-y-4">
                  <div className="flex items-center gap-2 text-zinc-400 text-sm">
                    <Wallet className="w-4 h-4" />
                    <span>Balance total del hogar</span>
                  </div>
                  <div className={`text-3xl sm:text-5xl font-bold tracking-tight ${balance >= 0 ? 'text-zinc-100' : 'text-rose-400'}`}>
                    {fmt(balance)}
                  </div>
                  <div className="grid grid-cols-2 gap-3 sm:gap-4">
                    <div className="bg-zinc-950 rounded-xl p-3 sm:p-4 border border-zinc-800">
                      <div className="flex items-center gap-2 text-emerald-400 text-xs sm:text-sm mb-1">
                        <TrendingUp className="w-4 h-4" />
                        <span>Ingresos</span>
                      </div>
                      <div className="text-lg sm:text-xl font-semibold">{fmt(totalIncome)}</div>
                    </div>
                    <div className="bg-zinc-950 rounded-xl p-3 sm:p-4 border border-zinc-800">
                      <div className="flex items-center gap-2 text-rose-400 text-xs sm:text-sm mb-1">
                        <TrendingDown className="w-4 h-4" />
                        <span>Gastos</span>
                      </div>
                      <div className="text-lg sm:text-xl font-semibold">{fmt(totalExpenses)}</div>
                    </div>
                  </div>
                  <div className="flex items-start gap-3 p-3 sm:p-4 rounded-xl bg-purple-950/30 border border-purple-900/40">
                    <MsgIcon className="w-5 h-5 text-purple-400 flex-shrink-0 mt-0.5" />
                    <p className="text-sm sm:text-base text-zinc-200">{msg.text}</p>
                  </div>
                </div>
                <div className="flex flex-col items-center justify-center">
                  <div className="text-xs text-zinc-500 mb-2 flex items-center gap-1.5">
                    <PawPrint className="w-3 h-3" />
                    <span>Aporte a ingresos</span>
                  </div>
                  <div className="w-full h-40 sm:h-48">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={chartData}
                          innerRadius={40}
                          outerRadius={70}
                          paddingAngle={totalIncome > 0 ? 3 : 0}
                          dataKey="value"
                          stroke="none"
                        >
                          <Cell fill={totalIncome > 0 ? '#a78bfa' : '#3f3f46'} />
                          <Cell fill={totalIncome > 0 ? '#fbbf24' : '#3f3f46'} />
                        </Pie>
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="flex gap-4 text-xs mt-1">
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-purple-400"></div>
                      <span className="text-zinc-400">{personA.name}</span>
                      <span className="text-zinc-600">{totalIncome > 0 ? `${Math.round((incomeA / totalIncome) * 100)}%` : '—'}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-amber-400"></div>
                      <span className="text-zinc-400">{personB.name}</span>
                      <span className="text-zinc-600">{totalIncome > 0 ? `${Math.round((incomeB / totalIncome) * 100)}%` : '—'}</span>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
              <PersonCard
                person={personA}
                share={shareA}
                net={netA}
                accent="purple"
                addExpense={() => addExpense('personA')}
                updateExpense={(id, field, value) => updateExpense('personA', id, field, value)}
                removeExpense={(id) => removeExpense('personA', id)}
                updatePerson={(field, value) => updatePerson('personA', field, value)}
                fmt={fmt}
              />
              <PersonCard
                person={personB}
                share={shareB}
                net={netB}
                accent="amber"
                addExpense={() => addExpense('personB')}
                updateExpense={(id, field, value) => updateExpense('personB', id, field, value)}
                removeExpense={(id) => removeExpense('personB', id)}
                updatePerson={(field, value) => updatePerson('personB', field, value)}
                fmt={fmt}
              />
            </section>

            <section className="relative bg-zinc-900 rounded-2xl border border-zinc-800 p-5 sm:p-6 shadow-xl">
              <CatEars />
              <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
                <div className="flex items-center gap-2">
                  <Home className="w-5 h-5 text-zinc-400" />
                  <h2 className="text-lg font-semibold">Gastos fijos del hogar</h2>
                </div>
                <div className="flex items-center bg-zinc-950 rounded-xl p-1 border border-zinc-800 self-start sm:self-auto">
                  <button
                    onClick={() => setSplitMode('equal')}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs sm:text-sm transition-colors ${splitMode === 'equal' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'}`}
                  >
                    <Scale className="w-3.5 h-3.5" />
                    50 / 50
                  </button>
                  <button
                    onClick={() => setSplitMode('proportional')}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs sm:text-sm transition-colors ${splitMode === 'proportional' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'}`}
                  >
                    <Percent className="w-3.5 h-3.5" />
                    Proporcional
                  </button>
                </div>
              </div>

              <div className="space-y-2 mb-4">
                {shared.length === 0 ? (
                  <p className="text-sm text-zinc-500 text-center py-4">Aún no hay gastos compartidos</p>
                ) : (
                  shared.map(exp => (
                    <div key={exp.id} className="flex items-center gap-2 bg-zinc-950 rounded-xl p-2.5 border border-zinc-800">
                      <PawPrint className="w-4 h-4 text-zinc-600 flex-shrink-0 ml-1" />
                      <input
                        type="text"
                        value={exp.name}
                        onChange={e => updateShared(exp.id, 'name', e.target.value)}
                        placeholder="Concepto"
                        className="flex-1 bg-transparent text-sm text-zinc-100 placeholder-zinc-600 outline-none min-w-0"
                      />
                      <div className="flex items-center gap-1">
                        <span className="text-zinc-600 text-sm">$</span>
                        <input
                          type="number"
                          value={exp.amount || ''}
                          onChange={e => updateShared(exp.id, 'amount', Number(e.target.value))}
                          placeholder="0"
                          className="w-20 sm:w-24 bg-transparent text-sm text-zinc-100 placeholder-zinc-600 outline-none text-right"
                        />
                      </div>
                      <button
                        onClick={() => removeShared(exp.id)}
                        className="p-1.5 rounded-lg text-zinc-600 hover:text-rose-400 hover:bg-zinc-900 transition-colors flex-shrink-0"
                        aria-label="Eliminar"
                      >
                        <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                  ))
                )}
              </div>

              <button
                onClick={addShared}
                className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl border border-dashed border-zinc-800 text-zinc-500 hover:border-zinc-700 hover:text-zinc-300 hover:bg-zinc-950 transition-colors text-sm mb-5"
              >
                <Plus className="w-4 h-4" />
                Agregar gasto fijo
              </button>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 pt-5 border-t border-zinc-800">
                <div>
                  <div className="text-xs text-zinc-500 mb-1">Total mensual</div>
                  <div className="text-lg font-semibold">{fmt(sharedTotal)}</div>
                </div>
                <div>
                  <div className="text-xs text-zinc-500 mb-1">{personA.name} paga</div>
                  <div className="text-lg font-semibold text-purple-400">{fmt(shareA)}</div>
                </div>
                <div>
                  <div className="text-xs text-zinc-500 mb-1">{personB.name} paga</div>
                  <div className="text-lg font-semibold text-amber-400">{fmt(shareB)}</div>
                </div>
              </div>
            </section>

            <section className="space-y-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <Target className="w-5 h-5 text-zinc-400" />
                  <h2 className="text-lg font-semibold">Moodboard de metas</h2>
                </div>
                <button
                  onClick={addGoal}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-xl text-xs sm:text-sm text-zinc-300 transition-colors"
                >
                  <Plus className="w-3.5 h-3.5" />
                  Nueva meta
                </button>
              </div>
              {goals.length === 0 ? (
                <div className="bg-zinc-900 rounded-2xl border border-zinc-800 border-dashed p-8 text-center">
                  <Cat className="w-8 h-8 text-zinc-700 mx-auto mb-2" />
                  <p className="text-sm text-zinc-500">Aún no tienen metas. ¡Sueñen en grande!</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {goals.map(goal => (
                    <GoalCard
                      key={goal.id}
                      goal={goal}
                      onUpdate={(field, value) => updateGoal(goal.id, field, value)}
                      onRemove={() => removeGoal(goal.id)}
                      fmt={fmt}
                    />
                  ))}
                </div>
              )}
            </section>

            <footer className="flex items-center justify-center gap-2 pt-4 pb-2 text-zinc-600 text-xs">
              <PawPrint className="w-3 h-3" />
              <span>Hecho con amor felino · Sincronizado en la nube</span>
              <PawPrint className="w-3 h-3" />
            </footer>

          </div>
        </div>
      );
    }

    // ---------- App (routing) ----------

    function App() {
      const [codigo, setCodigo] = useState(null);
      const [codigoInicial, setCodigoInicial] = useState('');
      const [booting, setBooting] = useState(true);

      useEffect(() => {
        const stored = localStorage.getItem(CODIGO_KEY);
        if (stored) {
          setCodigo(stored);
          setCodigoInicial(stored);
        }
        // Limpiar data vieja del localStorage (de la versión anterior)
        try { localStorage.removeItem('gatogasto-data-v1'); } catch {}
        setBooting(false);
      }, []);

      const handleEntrar = (c) => {
        try { localStorage.setItem(CODIGO_KEY, c); } catch {}
        setCodigo(c);
        setCodigoInicial(c);
      };

      const handleSalir = () => {
        try { localStorage.removeItem(CODIGO_KEY); } catch {}
        setCodigo(null);
      };

      if (booting) return <PantallaCarga mensaje="Abriendo GatoGasto..." />;
      if (!codigo) return <LoginScreen onEntrar={handleEntrar} codigoSugerido={codigoInicial} />;
      return <Hogar key={codigo} codigo={codigo} onSalir={handleSalir} />;
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
